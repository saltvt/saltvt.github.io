<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saltvt.dev | Blog</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <header>
        <a href="index.html" class="logo">Saltvt<span class="highlight">.dev</span></a>
        <nav>
            <ul>
                <li><a href="Projects.html">Projects</a></li>
                <li><a href="Commissions.html">Commissions</a></li>
                <li><a href="Support Me.html">Support Me!</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <!-- Blog content injected here by script.js -->
                <div id="blog-content" class="bio-text" style="text-align: left; white-space: pre-wrap;"></div>
            </div>
        </section>

        <!-- Post Viewer Container (hidden by default) -->
        <div id="post-viewer" style="display: none; max-width: 900px; margin: 0 auto; padding: 20px;">
            <button id="back-to-list" style="background: rgba(127, 255, 212, 0.2); border: 1px solid var(--accent-aquamarine); color: var(--accent-aquamarine); padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-family: 'Audiowide', sans-serif;">
                <i class="fas fa-arrow-left"></i> Back to Posts
            </button>
            <div id="post-content" style="background: rgba(0,0,0,0.3); padding: 30px; border-radius: 12px; line-height: 1.8;"></div>
        </div>

        <!-- Blog List Container -->
        <div id="blog-list">
            <!-- Search Bar -->
            <div id="search-container" style="margin: 30px 0; text-align: center;">
                <input type="text" id="blog-search" placeholder="Search posts..." style="padding: 10px 20px; font-size: 1rem; border: none; border-radius: 8px; width: 300px; background: rgba(255,255,255,0.1); color: white; font-family: 'Audiowide', sans-serif;">
            </div>

            <!-- Recent Posts -->
            <div id="recent-posts" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 0 20px;">
                <!-- Posts loaded dynamically here -->
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-socials">
            <a href="https://tiktok.com/@saltvt.tv" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="http://Twitch.tv/saltvt" aria-label="Twitch"><i class="fa-brands fa-twitch"></i></a>
            <a href="https://x.com/saltvtgg" aria-label="Twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://youtube.com/@saltvtgg" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://ko-fi.com/saltvt" aria-label="Ko-fi"><i class="fa-solid fa-mug-hot"></i></a>
            <a href="https://bsky.app/profile/saltvt.dev" aria-label="BlueSky"><i class="fa-solid fa-cloud"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
